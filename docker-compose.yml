services:
  backend:
    build: ./backend
    env_file: ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    # The backend connects to your EXISTING WordPress MySQL DB on the host.
    # Set DB_HOST=host.docker.internal (and DB_USER / DB_PASSWORD / DB_NAME) in backend/.env

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
